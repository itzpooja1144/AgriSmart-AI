<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSmart AI Chatbot</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .container{
            width:80%;
            max-width:900px;
            margin:40px auto;
        }

        h1{
            text-align:center;
            color:#22c55e;
        }

#chat-box{
    height:500px;
    overflow-y:auto;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    display:flex;
    flex-direction:column;
}

.user{
    text-align:right;
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    width:fit-content;
    max-width:70%;
    margin-left:auto;
}
.bot{
    text-align:left;
    background:#334155;
    color:#22c55e;
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    width:fit-content;
    max-width:70%;
    line-height:1.6;
}

        .input-area{
            display:flex;
            gap:10px;
        }

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:16px;
    outline:none;
}

        button{
            padding:14px 25px;
            border:none;
            background:#22c55e;
            color:white;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#16a34a;
        }

    </style>

</head>
<body>

<div class="container">

<h1>🤖 AgriSmart AI Chatbot</h1>

<div id="chat-box"></div>

<div class="input-area">

<input
id="message"
placeholder="Ask anything about farming...">

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

async function sendMessage() {
    alert("Clicked");
    let message = document.getElementById("message").value.trim();

    if (message === "") return;

    let chat = document.getElementById("chat-box");

    chat.innerHTML += `
        <div class="user">
            <b>You:</b><br>${message}
        </div>`;

    document.getElementById("message").value = "";

    try {

        let response = await fetch("/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        let data = await response.json();

        let reply = data.reply
            .replace(/\n/g, "<br>")
            .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>");

        chat.innerHTML += `
            <div class="bot">
                🤖 <b>AgriSmart AI</b><br><br>
                ${reply}
            </div>`;

    } catch (error) {

        chat.innerHTML += `
            <div class="bot">
                ❌ Error: ${error}
            </div>`;
    }

    chat.scrollTop = chat.scrollHeight;
}

document.getElementById("message").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});
</script>

</body>
</html>
