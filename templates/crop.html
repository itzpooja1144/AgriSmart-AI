<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Recommendation</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/crop.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

<div class="card">

<h1><i class="fa-solid fa-seedling"></i> Crop Recommendation</h1>

<p class="subtitle">
Enter soil and climate details to get the best crop recommendation.
</p>

<form action="/predict_crop" method="POST">

<div class="grid">

<div class="input-box">
<label>Nitrogen (N)</label>
<input type="number" name="N" required>
</div>

<div class="input-box">
<label>Phosphorus (P)</label>
<input type="number" name="P" required>
</div>

<div class="input-box">
<label>Potassium (K)</label>
<input type="number" name="K" required>
</div>

<div class="input-box">
<label>Temperature (°C)</label>
<input type="number" step="0.1" name="temperature" required>
</div>

<div class="input-box">
<label>Humidity (%)</label>
<input type="number" step="0.1" name="humidity" required>
</div>

<div class="input-box">
<label>Rainfall (mm)</label>
<input type="number" step="0.1" name="rainfall" required>
</div>

</div>

<button type="submit">
<i class="fa-solid fa-wheat-awn"></i>
Predict Crop
</button>

</form>

<a href="/dashboard" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
Back to Dashboard
</a>

</div>

</div>

</body>
</html>
